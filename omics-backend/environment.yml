name: omics-backend
channels:
  - conda-forge
dependencies:
  # --- core runtime ---
  # SpaGCN does not support Python 3.11+ (pip metadata requires <3.11)
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - scikit-learn<1.6.0
  - matplotlib
  - seaborn
  - networkx
  - python-dateutil
  - requests
  - pillow
  - scikit-image
  - umap-learn

  # --- single-cell / spatial ---
  - anndata>=0.11.4
  - scanpy>=1.11.0
  - squidpy>=1.6.5
  - python-igraph>=0.11.8
  - leidenalg>=0.10.2
  - pot>=0.9.5
  - tbb>=2022.1.0

  # --- api / notebooks / db ---
  - fastapi>=0.115.12
  - uvicorn>=0.34.0
  - pydantic>=2.11.4
  - flask
  - notebook
  - ipykernel
  - sqlalchemy>=2.0.40
  - databases>=0.9.0
  - aiomysql>=0.2.0
  - python-dotenv>=1.1.0
  - opencv

  # --- R / mclust (required by utils.py / admixture scripts) ---
  - r-base>=4.3
  - r-mclust
  - rpy2>=3.5.17

  # --- not always available on conda-forge, install via pip ---
  - pip:
      - gseapy>=1.1.8
      - xarray-dataclasses>=1.8.0
      - graphst==1.1.1
      - SpaGCN
      # SEDR is not published on PyPI; install from GitHub
      - "SEDR @ git+https://github.com/JinmiaoChenLab/SEDR.git"
      - torch
      - loki
      - openai

